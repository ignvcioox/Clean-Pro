<div class="w-full max-w-sm p-8 mx-auto mt-24 text-center border shadow-sm rounded-xl bg-zinc-900 border-zinc-800">
   <div class="flex justify-center mb-6">
      <div class="flex items-center justify-center w-16 h-16 rounded-full bg-green-500/10">
         <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
            stroke="currentColor" class="text-green-400 size-6">
            <path stroke-linecap="round" stroke-linejoin="round"
               d="M9 12.75 11.25 15 15 9.75M21 12c0 1.268-.63 2.39-1.593 3.068a3.745 3.745 0 0 1-1.043 3.296 3.745 3.745 0 0 1-3.296 1.043A3.745 3.745 0 0 1 12 21c-1.268 0-2.39-.63-3.068-1.593a3.746 3.746 0 0 1-3.296-1.043 3.745 3.745 0 0 1-1.043-3.296A3.745 3.745 0 0 1 3 12c0-1.268.63-2.39 1.593-3.068a3.745 3.745 0 0 1 1.043-3.296 3.746 3.746 0 0 1 3.296-1.043A3.746 3.746 0 0 1 12 3c1.268 0 2.39.63 3.068 1.593a3.746 3.746 0 0 1 3.296 1.043 3.746 3.746 0 0 1 1.043 3.296A3.745 3.745 0 0 1 21 12Z" />
         </svg>
      </div>
   </div>

   <h1 class="mb-2 text-lg font-semibold text-white">
      Verifica tu correo electrónico
   </h1>

   <p class="mb-8 text-sm text-zinc-400">
      Ingresa el código de 6 dígitos que recibiste en tu correo.
   </p>

   <form [formGroup]="checkEmailForm" (ngSubmit)="onSubmit()" autocomplete="off">
      <div class="flex justify-center gap-2 mb-4">
         <input type="text" formControlName="code" maxlength="6" pattern="\d*"
            class="w-32 h-12 text-xl font-bold tracking-widest text-center text-white border rounded bg-zinc-800 focus:outline-none border-zinc-700"
            [disabled]="isPosting()" autocomplete="off" />
      </div>
      <button type="submit"
         class="w-full px-4 py-2 font-medium text-white transition-colors bg-green-500 rounded hover:bg-green-600"
         [disabled]="checkEmailForm.invalid || isPosting()">
         @if (isPosting()) {
         <span class="loading loading-spinner loading-xs"></span>
         Verificando...
         } @else {
         Verificar código
         }
      </button>
   </form>

   <!-- <div *ngIf="errorMessage" class="mt-4 text-sm text-red-400">{{ errorMessage }}</div> -->
</div>
