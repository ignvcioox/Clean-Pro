<form class="w-full max-w-sm p-6 mx-auto border rounded-lg shadow-md bg-zinc-900 border-zinc-800">

   <h1 class="mb-2 text-2xl font-bold text-white">Restablecer contraseña</h1>
   <p class="mb-6 text-sm break-words text-zinc-400">
      Ingresa tu nueva contraseña para restablecer el acceso a tu cuenta.
   </p>

   <!-- Nueva contraseña -->
   <label class="w-full mb-2 input validator bg-zinc-800" for="password">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"
         class="size-4">
         <path stroke-linecap="round" stroke-linejoin="round"
            d="M15.75 5.25a3 3 0 0 1 3 3m3 0a6 6 0 0 1-7.029 5.912c-.563-.097-1.159.026-1.563.43L10.5 17.25H8.25v2.25H6v2.25H2.25v-2.818c0-.597.237-1.17.659-1.591l6.499-6.499c.404-.404.527-1 .43-1.563A6 6 0 1 1 21.75 8.25Z" />
      </svg>
      <input id="password" formControlName="password" type="password" placeholder="Nueva contraseña" required
         aria-label="Nueva contraseña" />
   </label>

   <button type="submit" aria-label="Restablecer contraseña"
      class="inline-flex items-center justify-center w-full gap-2 px-4 py-2 mt-2 font-medium text-white transition-colors bg-blue-500 rounded hover:bg-blue-600 focus:outline-none focus:ring-2 focus:ring-blue-400">
      Restablecer contraseña
   </button>

</form>
